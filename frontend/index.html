<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="JEE AI Counselor — Intelligent college and branch recommendations powered by your profile, not just your rank.">
<title>JEE AI Counselor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #23263a;
    --border: #2e3348; --text: #e8eaf0; --muted: #8b92a5;
    --blue: #4f8ef7; --green: #34d399; --amber: #fbbf24;
    --red: #f87171; --purple: #a78bfa; --teal: #2dd4bf;
    --radius: 12px; --gap: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  button { cursor: pointer; font-family: inherit; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--blue); outline-offset: 2px;
  }

  /* Layout */
  .app { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: var(--muted); margin-top: 8px; font-size: 1.05rem; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: var(--gap); }
  .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; color: var(--text); }
  
  /* Form */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 0.95rem; width: 100%; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: var(--blue); }
  input[type=range] { padding: 8px 0; accent-color: var(--blue); cursor: pointer; }
  .range-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); }

  /* Buttons */
  .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; font-size: 0.95rem; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: linear-gradient(135deg, #4f8ef7, #3b76e0); color: #fff; box-shadow: 0 4px 12px rgba(79, 142, 247, 0.3); }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { border-color: var(--blue); color: var(--blue); background: rgba(79, 142, 247, 0.05); }
  .btn-row { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
  .btn-sm { padding: 8px 16px; font-size: 0.85rem; border-radius: 6px; }

  /* Tabs — BUG-29-FIX: hide scrollbar on all browsers */
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 10px 20px; border: none; background: none; color: var(--muted); font-size: 0.95rem; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.2s; white-space: nowrap; }
  .tab:hover { color: var(--text); background: var(--surface); }
  .tab.active { color: #fff; background: var(--surface2); border-bottom: 2px solid var(--blue); border-radius: 8px 8px 0 0; }

  /* Hero Dashboard */
  .hero-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .hero-card { background: linear-gradient(145deg, var(--surface), var(--surface2)); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .hero-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--blue), var(--purple)); }
  .hero-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .hero-value { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .hero-sub { font-size: 0.9rem; color: var(--blue); font-weight: 600; }
  /* BUG-25-FIX: hero-stats-grid collapses to 1-col on narrow screens */
  .hero-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .hero-stat { background: rgba(0,0,0,0.2); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
  .hero-stat-val { font-size: 1.5rem; font-weight: 800; color: var(--text); }
  .hero-stat-lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
  .hero-stat-val.highlight { background: linear-gradient(135deg, var(--green), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* Pipeline Animation */
  .pipeline-container { padding: 40px; text-align: center; background: var(--surface); border-radius: var(--radius); border: 1px dashed var(--border); margin: 40px 0; }
  .pipeline-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; color: var(--blue); }
  .pipeline-step { display: flex; align-items: center; justify-content: flex-start; gap: 12px; margin-bottom: 16px; font-size: 1rem; color: var(--muted); opacity: 0; transform: translateY(10px); transition: all 0.4s ease; width: 100%; max-width: 320px; margin-left: auto; margin-right: auto; }
  .pipeline-step.active { opacity: 1; transform: translateY(0); color: var(--text); }
  .pipeline-step.done { opacity: 1; transform: translateY(0); color: var(--green); }
  .step-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid currentColor; font-size: 0.8rem; font-weight: bold; flex-shrink: 0; }

  /* Progress Bar — BUG-34: added ARIA roles via JS */
  .progress-wrap { margin: 8px 0; }
  .progress-header { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px; font-weight: 600; color: var(--muted); }
  .progress-track { background: var(--surface2); border-radius: 6px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 6px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }

  /* Recommendation Cards — BUG-26-FIX: minmax(min(340px,100%)) for narrow phones */
  .buckets { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(340px, 100%), 1fr)); gap: 24px; }
  .bucket-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .bucket-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .dream .bucket-badge   { background: rgba(167, 139, 250, 0.15); color: #a78bfa; border: 1px solid rgba(167, 139, 250, 0.3); }
  .target .bucket-badge  { background: rgba(96, 165, 250, 0.15); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.3); }
  .safe .bucket-badge    { background: rgba(52, 211, 153, 0.15); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.3); }
  .very_safe .bucket-badge { background: rgba(74, 222, 128, 0.15); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }

  .rec-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  .rec-card.level-dream { border-left: 3px solid #a78bfa; }
  .rec-card.level-target { border-left: 3px solid #60a5fa; }
  .rec-card.level-safe { border-left: 3px solid #34d399; }
  .rec-card.level-very_safe { border-left: 3px solid #4ade80; }
  .rec-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
  .rec-card.expanded { border-color: var(--blue); }
  .rec-main { padding: 20px; cursor: pointer; display: flex; flex-direction: column; gap: 12px; }
  .rec-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .rec-title-group { flex: 1; min-width: 0; }
  .rec-inst { font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1.3; }
  .rec-branch { font-size: 0.9rem; color: var(--blue); font-weight: 600; margin-top: 4px; }
  .rec-meta { font-size: 0.75rem; color: var(--muted); margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
  .rec-scores-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 8px; }
  
  /* Badges */
  .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
  .badge-green { background: rgba(52, 211, 153, 0.1); color: var(--green); border: 1px solid rgba(52, 211, 153, 0.2); }
  .badge-amber { background: rgba(251, 191, 36, 0.1); color: var(--amber); border: 1px solid rgba(251, 191, 36, 0.2); }

  /* Expanded Detail */
  .rec-detail { padding: 0 20px 20px 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.15); }
  .rec-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
  .detail-box { background: var(--surface2); padding: 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
  .detail-box h4 { font-size: 0.8rem; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px; }
  ul.custom-list { list-style: none; padding: 0; margin: 0; }
  ul.custom-list li { font-size: 0.85rem; padding: 6px 0; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: flex-start; gap: 8px; }
  ul.custom-list li:last-child { border-bottom: none; padding-bottom: 0; }
  ul.custom-list.pros li::before { content: '✓'; color: var(--green); font-weight: bold; flex-shrink: 0; }
  ul.custom-list.cons li::before { content: '✗'; color: var(--red); font-weight: bold; flex-shrink: 0; }
  ul.custom-list.neutral li::before { content: '→'; color: var(--blue); font-weight: bold; flex-shrink: 0; }

  /* Timeline */
  .timeline { margin-top: 12px; padding-left: 8px; border-left: 2px solid var(--border); }
  .timeline-item { position: relative; padding-left: 20px; margin-bottom: 16px; }
  .timeline-item:last-child { margin-bottom: 0; }
  .timeline-item::before { content: ''; position: absolute; left: -14px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--blue); border: 2px solid var(--surface2); }
  .timeline-year { font-size: 0.7rem; font-weight: 700; color: var(--purple); text-transform: uppercase; margin-bottom: 2px; }
  .timeline-desc { font-size: 0.85rem; color: var(--text); }

  .rec-actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }

  /* AI Explanation */
  .ai-explanation { background: linear-gradient(to right, rgba(30, 36, 64, 0.8), rgba(26, 29, 39, 0.9)); border: 1px solid var(--blue); border-radius: 16px; padding: 32px; margin-bottom: 32px; position: relative; }
  .ai-explanation::before { content: '🤖 AI Counselor'; position: absolute; top: -12px; left: 24px; background: var(--blue); color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; }
  .ai-explanation-content { display: grid; grid-template-columns: 1fr; gap: 24px; font-size: 0.95rem; line-height: 1.6; color: var(--text); }
  @media (min-width: 768px) { .ai-explanation-content { grid-template-columns: 1fr 1fr; } }

  /* Branch Comparison */
  .compare-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 32px; }
  .compare-controls { display: flex; gap: 16px; align-items: flex-end; margin-bottom: 24px; flex-wrap: wrap; }
  .compare-controls .form-group { flex: 1; min-width: 200px; }
  .compare-error { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--red); padding: 12px 16px; border-radius: 8px; color: #fca5a5; margin-bottom: 16px; }
  .compare-table-wrapper { overflow-x: auto; }
  .compare-table { width: 100%; border-collapse: collapse; text-align: left; min-width: 600px; }
  .compare-table th, .compare-table td { padding: 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .compare-table th { font-size: 0.85rem; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .compare-table td { font-size: 0.95rem; }
  .compare-winner { background: rgba(52, 211, 153, 0.1); border-left: 2px solid var(--green); }

  /* Chat Chips */
  .chat-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .chat-chip { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .chat-chip:hover { background: rgba(79, 142, 247, 0.15); border-color: var(--blue); color: var(--blue); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* Responsive — BUG-25, BUG-26, BUG-30 fixes */
  @media (max-width: 768px) {
    .hero-dashboard { grid-template-columns: 1fr; }
    .hero-stats-grid { grid-template-columns: repeat(3, 1fr); }
    .rec-scores-row { grid-template-columns: 1fr; gap: 12px; }
    .rec-detail-grid { grid-template-columns: 1fr !important; }
    .compare-controls { flex-direction: column; }
    .compare-controls .form-group { min-width: 100%; }
  }
  @media (max-width: 420px) {
    /* BUG-25-FIX: On very narrow screens, collapse hero stats to 1-col */
    .hero-stats-grid { grid-template-columns: 1fr; gap: 8px; }
    .hero-stat { padding: 12px; }
    .hero-stat-val { font-size: 1.2rem; }
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state p { font-size: 1rem; line-height: 1.6; }

  /* Print Styles for PDF Export */
  @media print {
    body { background: #fff; color: #000; }
    .tabs, .header, .ai-explanation, .compare-controls, .chat-chips { display: none !important; }
    .hero-card, .rec-card, .card { border: 1px solid #ccc; box-shadow: none; break-inside: avoid; }
    .hero-title, .hero-sub, .rec-meta, .bucket-badge { color: #555 !important; }
    .progress-track { border: 1px solid #ccc; background: #eee; }
    .progress-fill { border: 1px solid #000; }
    #panel-results { display: block !important; }
    .rec-actions { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API = '';  // same origin

// ── Helpers ──────────────────────────────────────────────────────────────────

// BUG-02/03/04/07-FIX: Safe percentage formatter — returns 0 for null/undefined/NaN
function safePct(val) {
  const n = val ?? 0;
  const pct = Math.round(n * 100);
  return isNaN(pct) ? 0 : pct;
}

// BUG-14-FIX: Extract FastAPI error detail correctly (uses 'detail' not 'error')
async function extractApiError(response) {
  try {
    const body = await response.json();
    return body.detail || body.error || `HTTP ${response.status}`;
  } catch {
    return `HTTP ${response.status}`;
  }
}

// ── Components ────────────────────────────────────────────────────────────────

// BUG-34/35-FIX: Added role="progressbar" and aria-valuenow for accessibility
function ProgressBar({ label, value, color = '#4f8ef7', highlight = false, id, tooltip }) {
  const pct = safePct(value);
  const barId = id || `pb-${label.replace(/\s+/g, '-').toLowerCase()}`;
  return (
    <div className="progress-wrap" title={tooltip || `Score based on historical closing ranks and variance`}>
      <div className="progress-header">
        <span id={`${barId}-label`}>{label}</span>
        <span style={{ color: highlight ? color : 'var(--muted)' }} aria-hidden="true">{pct}%</span>
      </div>
      <div
        className="progress-track"
        role="progressbar"
        aria-valuenow={pct}
        aria-valuemin={0}
        aria-valuemax={100}
        aria-labelledby={`${barId}-label`}
        aria-valuetext={`${pct}%`}
      >
        <div className="progress-fill" style={{ width: `${pct}%`, background: color }} />
      </div>
    </div>
  );
}

// BUG-17-FIX: PipelineAnimation accepts an `active` prop so the caller can
// cancel the callback when the API has already failed
function PipelineAnimation({ onComplete, active }) {
  const [step, setStep] = useState(0);
  const steps = [
    "Detecting Career Persona...",
    "Matching Interests...",
    "Searching Knowledge Base...",
    "Ranking Programs...",
    "Generating AI Explanation..."
  ];

  useEffect(() => {
    if (!active) return;
    let current = 0;
    const interval = setInterval(() => {
      current += 1;
      setStep(current);
      if (current >= steps.length) {
        clearInterval(interval);
        // Only call onComplete if still active (API hasn't failed)
        setTimeout(() => { if (active) onComplete(); }, 500);
      }
    }, 800);
    return () => clearInterval(interval);
  }, [active, onComplete]);

  return (
    <div className="pipeline-container" role="status" aria-label="Generating recommendations — please wait">
      <div className="pipeline-title">Generating Recommendations</div>
      <div aria-live="polite" aria-atomic="false">
        {steps.map((text, i) => {
          let statusClass = "pipeline-step";
          let icon = null;
          if (i < step) { statusClass += " done"; icon = <span aria-hidden="true">✓</span>; }
          else if (i === step) { statusClass += " active"; icon = <span className="spinner" aria-hidden="true" />; }
          return (
            <div key={i} className={statusClass}>
              <div className="step-icon">{icon}</div>
              <span>{text}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RecCard({ rec, level, onCompare, onAskAI, onDownloadPDF }) {
  const [open, setOpen] = useState(false);
  const expl = rec.explanation || {};
  const comp = rec.compatibility || {};
  const scores = rec.scores || {};
  const rc = rec.reason_codes || {};

  // BUG-01-FIX: Use safePct for all probability/score values
  const prob = safePct(rec.admission_probability);
  const probColor = prob >= 80 ? '#34d399' : prob >= 50 ? '#4f8ef7' : prob >= 25 ? '#fbbf24' : '#f87171';
  const cardId = `rec-${rec.institute?.replace(/\s+/g, '-')}-${rec.branch?.replace(/\s+/g, '-')}`.toLowerCase().replace(/[^a-z0-9-]/g, '');

  const handleToggle = () => setOpen(o => !o);
  const handleKeyDown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleToggle(); }};

  return (
    <div className={`rec-card level-${level} ${open ? 'expanded' : ''}`} id={cardId}>
      {/* BUG-32-FIX: aria-label describes which recommendation is being expanded */}
      <div
        className="rec-main"
        onClick={handleToggle}
        tabIndex={0}
        role="button"
        aria-expanded={open}
        aria-controls={`${cardId}-detail`}
        aria-label={`${rec.institute} — ${rec.branch}. Admission probability ${prob}%. Click to ${open ? 'collapse' : 'expand'} details.`}
        onKeyDown={handleKeyDown}
      >
        <div className="rec-header-row">
          <div className="rec-title-group">
            <div className="rec-inst">{rec.institute}</div>
            <div className="rec-branch">{rec.branch}</div>
            <div className="rec-meta">
              {rec.closing_rank && <span>Closing: {rec.closing_rank.toLocaleString()}</span>}
              <span aria-hidden="true">•</span>
              <span>{rec.state_quota || 'AI'}</span>
              <span aria-hidden="true">•</span>
              <span>{rec.gender === 'Female-Only' ? 'Female-Only' : 'Gender Neutral'}</span>
            </div>
          </div>
          <div style={{ textAlign: 'right', flexShrink: 0 }}>
            <div style={{ fontSize: '1.4rem', fontWeight: 800, color: probColor }}>{prob}%</div>
            <div style={{ fontSize: '0.7rem', color: 'var(--muted)', textTransform: 'uppercase', fontWeight: 600 }}>Admission</div>
          </div>
        </div>

        <div className="rec-scores-row">
          <ProgressBar label="Overall Match" value={scores.overall ?? 0} color="#a78bfa" highlight id={`${cardId}-overall`} />
          <ProgressBar label="Career Fit" value={comp.career_match ?? 0} color="#4f8ef7" id={`${cardId}-career`} />
        </div>

        {/* BUG-08-FIX: Use (array || []) pattern to avoid .map on undefined */}
        {(rc.labels || []).length > 0 && (
          <div className="badges" aria-label="Recommendation highlights">
            {(rc.labels || []).slice(0,3).map((b, i) => <span key={i} className="badge badge-green">{b}</span>)}
            {(rc.warnings || []).slice(0,1).map((w, i) => <span key={i} className="badge badge-amber">{w}</span>)}
          </div>
        )}
      </div>

      {open && (
        <div className="rec-detail" id={`${cardId}-detail`}>
          <div className="rec-detail-grid">
            <div className="detail-box">
              <h4>🎯 Strengths</h4>
              <ul className="custom-list pros" aria-label="Strengths">
                {(expl.pros || []).map((p, i) => <li key={i}><span>{p}</span></li>)}
              </ul>
            </div>
            <div className="detail-box">

  );
}

// BUG-47-FIX: BranchComparison accepts initialBranchA to pre-populate from rec card
function BranchComparison({ onAskAI, initialBranchA }) {
  const branches = [
    "Computer Science and Engineering",
    "Electronics and Communication Engineering",
    "Electrical Engineering",
    "Mechanical Engineering",
    "Civil Engineering",
    "Chemical Engineering",
    "Mathematics and Computing",
    "Engineering Physics",
    "Data Science and Artificial Intelligence"
  ];

  const [branchA, setBranchA] = useState(initialBranchA || branches[0]);
  const [branchB, setBranchB] = useState(branches[1]);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  // BUG-15-FIX: Added error state so user sees feedback on failure
  const [error, setError] = useState(null);

  // Update branchA when initialBranchA changes (from RecCard compare button)
  useEffect(() => {
    if (initialBranchA) setBranchA(initialBranchA);
  }, [initialBranchA]);

  const compare = async () => {
    setLoading(true);
    setError(null);
    setData(null);
    try {
      const r = await fetch(`${API}/compare/branches?branch_a=${encodeURIComponent(branchA)}&branch_b=${encodeURIComponent(branchB)}`);
      // BUG-12-FIX: Check r.ok and surface error to user
      if (!r.ok) {
        const msg = await extractApiError(r);
        setError(`Comparison failed: ${msg}`);
        return;
      }
      const d = await r.json();
      setData(d);
    } catch (e) {
      setError(`Network error: ${e.message}`);
    } finally {
      setLoading(false);
    }
  };

  const getVal = (profile, key) => {
    const v = profile?.[key];
    return v != null ? v : 'N/A';
  };

  return (
    <div className="compare-container">
      <h2 style={{ marginBottom: 16 }}>Interactive Branch Comparison</h2>
      <div className="compare-controls">
        <div className="form-group">
          <label htmlFor="compare-branch-a">Branch 1</label>
          <select id="compare-branch-a" value={branchA} onChange={e=>setBranchA(e.target.value)}>
            {branches.map(b => <option key={b} value={b}>{b}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label htmlFor="compare-branch-b">Branch 2</label>
          <select id="compare-branch-b" value={branchB} onChange={e=>setBranchB(e.target.value)}>
            {branches.map(b => <option key={b} value={b}>{b}</option>)}
          </select>
        </div>
        <button className="btn btn-primary" onClick={compare} disabled={loading || branchA === branchB} aria-label="Compare selected branches">
          {loading ? <><span className="spinner" aria-hidden="true" /> Comparing...</> : 'Compare →'}
        </button>
      </div>

      {error && <div className="compare-error" role="alert">{error}</div>}

      {data && (
        <div className="compare-table-wrapper">
          {data.verdict && (
            <div style={{ marginBottom: 20, padding: 16, background: 'var(--surface2)', borderRadius: 8, borderLeft: '4px solid var(--blue)' }}>
              <strong>AI Verdict:</strong> {data.verdict}
            </div>
          )}
          <table className="compare-table" aria-label={`Comparison of ${branchA} vs ${branchB}`}>
            <thead>
              <tr>
                <th scope="col">Metric</th>
                <th scope="col">{data.branch_a?.name || branchA}</th>
                <th scope="col">{data.branch_b?.name || branchB}</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Median Salary</td>
                <td className={data.head_to_head?.median_salary === branchA ? 'compare-winner' : ''}>
                  {data.branch_a?.profile?.median_lpa ? `~${data.branch_a.profile.median_lpa} LPA` : 'N/A'}
                </td>
                <td className={data.head_to_head?.median_salary === branchB ? 'compare-winner' : ''}>
                  {data.branch_b?.profile?.median_lpa ? `~${data.branch_b.profile.median_lpa} LPA` : 'N/A'}
                </td>
              </tr>
              <tr>
                <td>Coding Intensity</td>
                {/* BUG-09/10-FIX: Use ?? 'N/A' to prevent "undefined/5" renders */}
                <td className={data.head_to_head?.coding_intensity === branchA ? 'compare-winner' : ''}>{getVal(data.branch_a?.profile, 'coding_intensity') !== 'N/A' ? `${data.branch_a.profile.coding_intensity}/5` : 'N/A'}</td>
                <td className={data.head_to_head?.coding_intensity === branchB ? 'compare-winner' : ''}>{getVal(data.branch_b?.profile, 'coding_intensity') !== 'N/A' ? `${data.branch_b.profile.coding_intensity}/5` : 'N/A'}</td>
              </tr>
              <tr>
                <td>Research Scope</td>
                <td className={data.head_to_head?.research_scope === branchA ? 'compare-winner' : ''}>{getVal(data.branch_a?.profile, 'research_scope') !== 'N/A' ? `${data.branch_a.profile.research_scope}/5` : 'N/A'}</td>
                <td className={data.head_to_head?.research_scope === branchB ? 'compare-winner' : ''}>{getVal(data.branch_b?.profile, 'research_scope') !== 'N/A' ? `${data.branch_b.profile.research_scope}/5` : 'N/A'}</td>
              </tr>
              <tr>
                <td>Startup Fit</td>
                {/* BUG-11-FIX: Explicit N/A fallback */}
                <td>{data.branch_a?.startup_fit || 'N/A'}</td>
                <td>{data.branch_b?.startup_fit || 'N/A'}</td>
              </tr>
              <tr>
                <td>Top Recruiters</td>
                <td>{(data.branch_a?.tier1_recruiters || []).join(', ') || 'N/A'}</td>
                <td>{(data.branch_b?.tier1_recruiters || []).join(', ') || 'N/A'}</td>
              </tr>
              <tr>
                <td>MBA Transition</td>
                <td>{data.branch_a?.mba_transition || 'N/A'}</td>
                <td>{data.branch_b?.mba_transition || 'N/A'}</td>
              </tr>
            </tbody>
          </table>
          <div style={{ marginTop: 16 }}>
            <button className="btn btn-sm btn-ghost" onClick={() => onAskAI(`Explain in detail the difference between ${branchA} and ${branchB}`)}>
              💬 Ask AI Counselor about this comparison
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState('form');
  const [loading, setLoading] = useState(false);
  // BUG-17-FIX: pipelineActive tracks whether animation should call onComplete
  const [pipelineActive, setPipelineActive] = useState(false);
  const [error, setError] = useState(null);
  const [result, setResult] = useState(null);
  // BUG-47-FIX: track which branch to pre-populate in comparison
  const [compareInitBranch, setCompareInitBranch] = useState(null);
  const [chatQ, setChatQ] = useState('');
  const [chatHistory, setChatHistory] = useState([]);
  const [chatLoading, setChatLoading] = useState(false);
  // BUG-23-FIX: ref to scroll chat to bottom on new messages
  const chatEndRef = useRef(null);

  const defaultForm = {
    jee_advanced_rank: 3500, gender: 'male', category: 'OPEN', home_state: 'Maharashtra',
    interest_coding: 0.8, interest_ai_ml: 0.7, interest_research: 0.4, interest_core_engineering: 0.2,
    interest_electronics: 0.3, interest_mechanical: 0.1, interest_civil: 0.1, interest_chemical: 0.1,
    wants_startup: false, wants_mba: false, wants_govt_job: false, wants_higher_studies_abroad: false, wants_research: false,
    salary_priority: 0.6, brand_priority: 0.5, location_flexibility: 0.6,
  };

  const [form, setForm] = useState(defaultForm);

  const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));
  
  const resetForm = () => setForm(defaultForm);

  // BUG-23-FIX: auto-scroll chat to bottom on new messages
  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [chatHistory, chatLoading]);

  const submit = useCallback(async () => {
    if (form.jee_advanced_rank < 1 || form.jee_advanced_rank > 1500000) {
      setError("Please enter a valid JEE rank between 1 and 1,500,000.");
      return;
    }
    setLoading(true);
    setPipelineActive(true);
    setError(null);
    setResult(null);
    try {
      const r = await fetch(`${API}/recommend`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(form),
      });
      if (!r.ok) {
        // BUG-14-FIX: use extractApiError to get 'detail' field from FastAPI errors
        const msg = await extractApiError(r);
        throw new Error(msg);
      }
      const data = await r.json();
      setResult(data);
      // Pipeline animation will call onPipelineComplete when it finishes
    } catch (e) {
      setError(e.message);
      setLoading(false);
      // BUG-17-FIX: Cancel pipeline so it doesn't switch to results on failure
      setPipelineActive(false);
    }
  }, [form]);

  // BUG-17-FIX: Only switch tab if both pipeline done AND result ready
  const onPipelineComplete = useCallback(() => {
    setLoading(false);
    setPipelineActive(false);
    if (result) {
      setTab('results');
    }
    // If result not yet loaded, don't switch — result useEffect below handles it
  }, [result]);

  // If result arrives after pipeline finishes, switch tab then
  useEffect(() => {
    if (result && !pipelineActive && !loading) {
      setTab('results');
    }
  }, [result, pipelineActive, loading]);

  // BUG-18-FIX: jumpToChat actually sends the message instead of just pre-filling
  const jumpToChat = useCallback((query) => {
    setTab('chat');
    // Send after a tick so the chat tab renders first
    setTimeout(() => sendChatMessage(query), 50);
  }, []);

  // BUG-47-FIX: openCompare pre-populates comparison with the chosen branch
  const openCompare = useCallback((branch) => {
    setCompareInitBranch(branch);
    setTab('compare');
  }, []);

  const sendChatMessage = async (question) => {
    if (!question?.trim()) return;
    const q = question.trim();
    setChatQ('');
    setChatLoading(true);
    setChatHistory(h => [...h, { role: 'user', text: q }]);
    try {
      const payload = {
        student: form,
        question: q,
        // Send history up to last 4 turns (excluding error messages)
        history: chatHistory.filter(h => !h.text.startsWith('⚠')).slice(-4)
      };
      
      const r = await fetch(`${API}/counselor/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      // BUG-13-FIX: check r.ok before reading body
      if (!r.ok) {
        const msg = await extractApiError(r);
        setChatHistory(h => [...h, { role: 'ai', text: `⚠ Error: ${msg}` }]);
        return;
      }
      const data = await r.json();
      setChatHistory(h => [...h, { role: 'ai', text: data.answer || 'No response received.', sources: data.sources }]);
    } catch (e) {
      setChatHistory(h => [...h, { role: 'ai', text: `⚠ Network error: ${e.message}` }]);
    } finally {
      setChatLoading(false);
    }
  };

  const handleSendChat = () => sendChatMessage(chatQ);

  const handleDownloadPDF = () => {
    // Generate simple PDF export using CSS @media print
    window.print();
  };

  // BUG-06/07-FIX: Safe access to persona fields
  const persona = result?.persona || {};
  const topRec = result?.buckets?.dream?.[0] || result?.buckets?.target?.[0] || null;

  return (
    <div className="app">
      <div className="header">
        <h1 id="app-title">🎓 JEE AI Counselor</h1>
        <p>Intelligent college &amp; branch recommendations — powered by your profile, not just your rank</p>
      </div>

      {/* BUG-31-FIX: tab bar has role="tablist" and each tab has role="tab" + aria-selected */}
      <div className="tabs" role="tablist" aria-label="Application sections">
        <button
          className={`tab ${tab === 'form' ? 'active' : ''}`}
          role="tab"
          aria-selected={tab === 'form'}
          aria-controls="panel-form"
          id="tab-form"
          onClick={() => setTab('form')}
        >Profile</button>
        <button
          className={`tab ${tab === 'results' ? 'active' : ''}`}
          role="tab"
          aria-selected={tab === 'results'}
          aria-controls="panel-results"
          id="tab-results"
          disabled={!result}
          onClick={() => setTab('results')}
        >Recommendations {result ? `(${result.total_scored})` : ''}</button>
        <button
          className={`tab ${tab === 'compare' ? 'active' : ''}`}
          role="tab"
          aria-selected={tab === 'compare'}
          aria-controls="panel-compare"
          id="tab-compare"
          onClick={() => setTab('compare')}
        >Compare</button>
        <button
          className={`tab ${tab === 'chat' ? 'active' : ''}`}
          role="tab"
          aria-selected={tab === 'chat'}
          aria-controls="panel-chat"
          id="tab-chat"
          onClick={() => setTab('chat')}
        >AI Counselor</button>
      </div>

      {/* BUG-36-FIX: Error banner with role="alert" so screen readers announce it */}
      {error && (
        <div role="alert" aria-live="assertive" style={{ background: 'rgba(248, 113, 113, 0.1)', border: '1px solid var(--red)', padding: 16, borderRadius: 8, color: '#fca5a5', marginBottom: 16 }}>
          ⚠ {error}
        </div>
      )}

      {/* Pipeline */}
      {pipelineActive && <PipelineAnimation onComplete={onPipelineComplete} active={pipelineActive} />}

      {/* ── FORM TAB ── */}
      {tab === 'form' && !pipelineActive && (
        <div id="panel-form" role="tabpanel" aria-labelledby="tab-form">
          <div className="card">

                  <option value="female">Female</option>
                  <option value="other">Other / Prefer not to say</option>
                </select>
              </div>
              <div className="form-group">
                <label htmlFor="category-select">Category</label>

                  {result.student_summary && (
                    <div style={{ marginTop: 24, padding: 16, background: 'rgba(0,0,0,0.2)', borderRadius: 12, border: '1px solid rgba(255,255,255,0.05)' }}>
                      <p style={{ fontSize: '0.9rem', color: 'var(--text)', lineHeight: 1.5 }}>{result.student_summary}</p>
                    </div>
                  )}
                </div>

                {topRec && (
                  <div className="hero-card" style={{ background: 'linear-gradient(145deg, rgba(79, 142, 247, 0.1), var(--surface))' }}>
                    <div>
                      <div className="hero-title">Top Recommendation</div>
                      <div className="hero-value">{topRec.institute}</div>
                      <div className="hero-sub" style={{ color: 'var(--green)' }}>{topRec.branch}</div>
                    </div>
                    <div className="hero-stats-grid" style={{ marginTop: 24 }}>
                      {/* BUG-02/03/04-FIX: All use safePct to prevent NaN% */}
                      <div className="hero-stat">
                        <div className="hero-stat-val highlight">{safePct(topRec.scores?.overall)}%</div>
                        <div className="hero-stat-lbl">Overall Match</div>
                      </div>
                      <div className="hero-stat">
                        <div className="hero-stat-val">{safePct(topRec.admission_probability)}%</div>
                        <div className="hero-stat-lbl">Admission Prob</div>
                      </div>
                      <div className="hero-stat">
                        <div className="hero-stat-val">{safePct(topRec.compatibility?.career_match)}%</div>
                        <div className="hero-stat-lbl">Career Fit</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* AI Explanation */}
              {result.counselor_insight && (
                <div className="ai-explanation" aria-label="AI Counselor insight">
                  <div className="ai-explanation-content">
                    <div>
                      <h3 style={{ fontSize: '1.1rem', color: 'var(--blue)', marginBottom: 8 }}>Why this strategy?</h3>
                      <p>{result.counselor_insight}</p>
                    </div>
                    <div>
                      <h3 style={{ fontSize: '1.1rem', color: 'var(--blue)', marginBottom: 8 }}>Next Steps</h3>
                      <p>Review the categorized buckets below. Compare specific branches or ask the AI Counselor deep-dive questions to finalize your choices.</p>
                      <div style={{ display: 'flex', gap: 12, marginTop: 16, flexWrap: 'wrap' }}>
                        <button className="btn btn-sm btn-primary" onClick={() => setTab('chat')}>💬 Ask AI Counselor</button>
                        <button className="btn btn-sm btn-ghost" onClick={handleDownloadPDF}>📄 Export PDF Report</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* Buckets */}
              <div className="buckets">
                {['dream', 'target', 'safe', 'very_safe'].map(level => {
                  const recs = result.buckets?.[level] || [];
                  if (!recs.length) return null;
                  const labels = { dream: 'Dream', target: 'Target', safe: 'Safe', very_safe: 'Very Safe' };
                  return (
                    <section key={level} aria-labelledby={`bucket-${level}`}>
                      <div className="bucket-header">
                        <h2 id={`bucket-${level}`} className={`bucket-badge ${level}`}>{labels[level]}</h2>
                        <span style={{ fontSize: '0.8rem', color: 'var(--muted)' }}>{recs.length} Option{recs.length !== 1 ? 's' : ''}</span>
                      </div>
                      {recs.map((r, i) => (
                        <RecCard
                          key={`${level}-${i}`}
                          rec={r}
                          level={level}
                          onCompare={openCompare}
                          onAskAI={jumpToChat}
                          onDownloadPDF={handleDownloadPDF}
                        />
                      ))}
                    </section>
                  );
                })}
              </div>
            </>
          )}
        </div>
      )}

      {/* ── COMPARE TAB ── */}
      {tab === 'compare' && (
        <div id="panel-compare" role="tabpanel" aria-labelledby="tab-compare">
          {/* BUG-47-FIX: Pass initialBranchA so compare pre-fills from rec card */}
          <BranchComparison onAskAI={jumpToChat} initialBranchA={compareInitBranch} />
        </div>
      )}

      {/* ── CHAT TAB ── */}
      {tab === 'chat' && (
        <div id="panel-chat" role="tabpanel" aria-labelledby="tab-chat">
          <div className="card" style={{ marginBottom: 16 }}>
            <h2>🤖 AI Counselor Chat</h2>
            <p style={{ color: 'var(--muted)', fontSize: '0.9rem' }}>
              Ask specific follow-up questions. I have full context of your profile, interests, and the JoSAA knowledge base.
            </p>
          </div>

          {/* BUG-33-FIX: Emoji wrapped in aria-hidden span */}
          <div className="chat-chips" aria-label="Suggested questions">
            {[
              "Why not IIT Kanpur?",
              "Should I choose EE over Mechanical?",
              "Which branch is best for startups?",
              "Is MnC better than CSE for me?",
              "Explain home state advantage in NITs",
            ].map(q => (
              <button
                key={q}
                className="chat-chip"
                onClick={() => sendChatMessage(q)}
                disabled={chatLoading}
                aria-label={`Ask: ${q}`}
              >
                <span aria-hidden="true">✨</span> {q}
              </button>
            ))}
          </div>

          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 16, padding: 24, display: 'flex', flexDirection: 'column' }}>
            <div
              style={{ overflowY: 'auto', maxHeight: 400, marginBottom: 20 }}
              aria-live="polite"
              aria-label="Chat history"
              role="log"
            >
              {chatHistory.length === 0 && (
                <div style={{ color: 'var(--muted)', textAlign: 'center', padding: '40px 0', fontSize: '0.95rem' }}>
                  No messages yet. Click a suggestion above or type your own question.
                </div>
              )}
              {chatHistory.map((m, i) => (
                <div key={i} style={{
                  padding: '16px 20px', borderRadius: 12, marginBottom: 12, fontSize: '0.95rem', lineHeight: 1.6,
                  background: m.role === 'user' ? 'rgba(79, 142, 247, 0.1)' : 'var(--surface2)',
                  border: `1px solid ${m.role === 'user' ? 'rgba(79, 142, 247, 0.3)' : 'var(--border)'}`,
                  marginLeft: m.role === 'user' ? 'auto' : '0',
                  maxWidth: '85%',
                }}>
                  <div style={{ fontWeight: 700, fontSize: '0.75rem', color: m.role === 'user' ? 'var(--blue)' : 'var(--purple)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                    {m.role === 'user' ? 'You' : 'AI Counselor'}
                  </div>
                  <div>{m.text}</div>
                  {m.sources?.length > 0 && (
                    <div style={{ fontSize: '0.75rem', color: 'var(--muted)', marginTop: 8, borderTop: '1px solid var(--border)', paddingTop: 8 }}>
                      Sources: {m.sources.join(', ')}
                    </div>
                  )}
                </div>
              ))}
              {chatLoading && (
                <div style={{ padding: '16px 20px', background: 'var(--surface2)', borderRadius: 12, maxWidth: '85%', color: 'var(--muted)', display: 'inline-flex', alignItems: 'center', gap: 10 }} aria-label="AI is thinking">
                  <span className="spinner" aria-hidden="true"></span> Thinking...
                </div>
              )}
              {/* BUG-23-FIX: Scroll anchor */}
              <div ref={chatEndRef} />
            </div>

            <div style={{ display: 'flex', gap: 12 }}>
              {/* BUG-37-FIX: aria-label on chat input */}
              <label htmlFor="chat-input" className="sr-only" style={{ position: 'absolute', width: 1, height: 1, overflow: 'hidden', clip: 'rect(0,0,0,0)' }}>Chat message</label>
              <input
                id="chat-input"
                value={chatQ}
                onChange={e => setChatQ(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && !chatLoading && handleSendChat()}
                placeholder="Type your question..."
                disabled={chatLoading}
                aria-label="Chat message"
                style={{ flex: 1, padding: '16px', fontSize: '1rem', borderRadius: 12 }}
              />
              <button
                id="chat-send-btn"
                className="btn btn-primary"
                onClick={handleSendChat}
                disabled={chatLoading || !chatQ.trim()}
                style={{ borderRadius: 12, padding: '0 32px' }}
                aria-label="Send message"
              >
                {chatLoading ? <span className="spinner" aria-hidden="true" /> : 'Send'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
