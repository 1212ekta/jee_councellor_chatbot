version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENABLE_LLM_EXPLANATIONS=${ENABLE_LLM_EXPLANATIONS:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - APP_ENV=${APP_ENV:-production}
    volumes:
      # Mount cutoffs dir — drop new xlsx files here, they auto-load on restart
      - ../data/cutoffs:/app/data/cutoffs
      # C6-FIX: Persist DuckDB and cache, but mount in subdirectories to avoid shadowing /app/data/knowledge
      - jee_db:/app/data/jee_counselor.duckdb
      - jee_cache:/app/data/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # H10-FIX: Increased start_period to 120s
      start_period: 120s

volumes:
  jee_db:
  jee_cache:
